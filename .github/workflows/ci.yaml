name: Buf CI

on: [pull_request]

jobs:
  validate-and-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: bufbuild/buf-setup-action@v1
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}

      - name: Lint Protobuf
        run: make lint-proto

      - name: Verify Build & Gen
        run: make proto

      - name: Check for uncommitted changes
        run: |
          git diff --exit-code || (echo "Error: Uncommitted changes detected after build" && exit 1)

      - uses: bufbuild/buf-breaking-action@v1
        with:
          against: "https://github.com/reteflow/plugin-spec.git#branch=main"
